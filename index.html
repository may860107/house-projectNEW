                <form action="https://formspree.io/f/xeervovn" method="POST" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <input type="text" name="name" placeholder="您的姓名" required class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <input type="tel" name="phone" placeholder="聯絡電話" required class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <select name="identity" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <option value="屋主" class="text-gray-800">我是屋主 - 我要委託出租規劃</option>
                        <option value="承租方" class="text-gray-800">我是承租方 - 我在尋找優質房源</option>
                    </select>
                    <textarea name="message" rows="4" placeholder="補充訊息..." class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
